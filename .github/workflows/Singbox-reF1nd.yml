name: Build sing-box Core
on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: '选择编译分支'
        type: choice
        required: true
        default: 'reF1nd-testing'
        options:
          - reF1nd-testing
          - reF1nd-stable
          - r1.14.0-a28
      custom_version:
        description: '输入版本号（留空则自动获取）'
        type: string
        required: false
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prepare context
        id: prep
        run: |
          UPSTREAM_REPO="https://github.com/77160860/sing-box.git"
          REF="${{ github.event.inputs.source_ref }}"
          echo "REF=$REF" >> $GITHUB_ENV
          echo "UPSTREAM_REPO=$UPSTREAM_REPO" >> $GITHUB_ENV
      - name: Resolve SHA (tag/branch/commit)
        id: upstream
        run: |
          set -e
          SHA=$(git ls-remote --heads "${UPSTREAM_REPO}" "refs/heads/${REF}" | cut -f1)
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote --tags "${UPSTREAM_REPO}" "refs/tags/${REF}" | cut -f1)
          fi
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote --tags "${UPSTREAM_REPO}" "refs/tags/${REF}^{}" | cut -f1)
          fi
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote "${UPSTREAM_REPO}" "${REF}" | cut -f1)
          fi
          if [ -z "$SHA" ]; then
            echo "ERROR: REF '${REF}' not found in 77160860/sing-box."
            exit 1
          fi
          SHORT="${SHA:0:7}"
          echo "UPSTREAM_SHA=$SHA" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT" >> $GITHUB_ENV
      - name: Checkout upstream with full history
        uses: actions/checkout@v4
        with:
          repository: 77160860/sing-box
          ref: ${{ env.UPSTREAM_SHA }}
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true
      - name: Extract, Clean, and Prefix Version
        id: extract_version
        run: |
          INPUT_VER="${{ github.event.inputs.custom_version }}"
          if [ -n "$INPUT_VER" ]; then
            FINAL_VERSION="$INPUT_VER"
            echo "输入版本号: $FINAL_VERSION"
          else
            go mod tidy
            RAW_VERSION=$(go run ./cmd/internal/read_tag)
            if [ -z "$RAW_VERSION" ]; then
              echo "ERROR: 'go run ./cmd/internal/read_tag' failed to produce a version string."
              exit 1
            fi
            
            if [[ ! "$RAW_VERSION" =~ -reF1nd$ ]]; then
              VERSION_WITH_SUFFIX="${RAW_VERSION}-reF1nd"
            else
              VERSION_WITH_SUFFIX="$RAW_VERSION"
            fi

            if [[ "$VERSION_WITH_SUFFIX" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-alpha\.([0-9]+)-reF1nd$ ]]; then
              FINAL_VERSION="r${BASH_REMATCH[1]}-a${BASH_REMATCH[2]}"
            elif [[ "$VERSION_WITH_SUFFIX" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta\.([0-9]+)-reF1nd$ ]]; then
              FINAL_VERSION="r${BASH_REMATCH[1]}-b${BASH_REMATCH[2]}"
            elif [[ "$VERSION_WITH_SUFFIX" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-reF1nd$ ]]; then
              FINAL_VERSION="r${BASH_REMATCH[1]}"
            else
              CLEANED=$(echo "$RAW_VERSION" | sed -E 's/-reF1nd$//')
              FINAL_VERSION="r${CLEANED}"
            fi
            echo "获取版本号: $RAW_VERSION -> $FINAL_VERSION"
          fi

          echo "VERSION=$FINAL_VERSION" >> $GITHUB_ENV
      - name: Define build metadata
        id: meta
        run: |
          TAGS_COMMON="with_quic with_utls with_clash_api"
          echo "BUILD_TAGS=$TAGS_COMMON" >> $GITHUB_ENV
          echo "OUT_LINUX_ARM64=sing-box-arm64" >> $GITHUB_ENV
          echo "OUT_LINUX_AMD64=sing-box-amd64" >> $GITHUB_ENV
          echo "BUILD_TAGS_WIN=$TAGS_COMMON with_purego" >> $GITHUB_ENV
          echo "OUT_WIN_ARM64=sing-box-windows-arm64.exe" >> $GITHUB_ENV
          echo "OUT_WIN_AMD64=sing-box-windows-amd64.exe" >> $GITHUB_ENV
          echo "TAG=singbox" >> $GITHUB_ENV
      - name: Build sing-box (linux arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -o "${OUT_LINUX_ARM64}" \
            -ldflags="-s -w -checklinkname=0 -X github.com/sagernet/sing-box/constant.Version=${VERSION}" \
            -tags="${BUILD_TAGS}" ./cmd/sing-box
      - name: Build sing-box (linux amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -o "${OUT_LINUX_AMD64}" \
            -ldflags="-s -w -checklinkname=0 -X github.com/sagernet/sing-box/constant.Version=${VERSION}" \
            -tags="${BUILD_TAGS}" ./cmd/sing-box
      - name: Build sing-box (windows arm64)
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -o "${OUT_WIN_ARM64}" \
            -ldflags="-s -w -checklinkname=0 -X github.com/sagernet/sing-box/constant.Version=${VERSION}" \
            -tags="${BUILD_TAGS_WIN}" ./cmd/sing-box
      - name: Build sing-box (windows amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -o "${OUT_WIN_AMD64}" \
            -ldflags="-s -w -checklinkname=0 -X github.com/sagernet/sing-box/constant.Version=${VERSION}" \
            -tags="${BUILD_TAGS_WIN}" ./cmd/sing-box
      - name: Verify arch
        run: |
          ls -lh sing-box-*
      - name: Cleanup old release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: ${{ env.TAG }}
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Singbox lite (${{ env.VERSION }})
          body: |
            Source: ${{ env.REF }}
            Version: ${{ env.VERSION }}
            Commit: ${{ env.SHORT_SHA }}
            Platforms: Linux (arm64/amd64), Windows (arm64/amd64)
            Build Tags (Linux): ${{ env.BUILD_TAGS }}
            Build Tags (Windows): ${{ env.BUILD_TAGS_WIN }}
          prerelease: false
          make_latest: true
          files: |
            ${{ env.OUT_LINUX_ARM64 }}
            ${{ env.OUT_LINUX_AMD64 }}
            ${{ env.OUT_WIN_ARM64 }}
            ${{ env.OUT_WIN_AMD64 }}
