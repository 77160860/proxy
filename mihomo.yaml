proxy-providers:
  🌈:
    url: "订阅链接"
    type: http

mode: rule
ipv6: false
allow-lan: true
mixed-port: 7890
log-level: error
bind-address: "*"
unified-delay: true
tcp-concurrent: true
find-process-mode: off
keep-alive-idle: 600
keep-alive-interval: 15

external-ui: ui
external-ui-name: zashboard
external-controller: 0.0.0.0:9090
external-ui-url: "https://ghfast.top/github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.wechat.com"
    - "+.qq.com"
    - "+.wechatapp.com"
    - "+.oray.com"
    - "+.sunlogin.net"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  route-exclude-address-set: [cnip,pvip]

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/15
  fake-ip-filter-mode: blacklist
  fake-ip-filter: [rule-set:filter,rule-set:cn]
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 123.125.81.6
  nameserver:
    - quic://dns.alidns.com
    - https://doh.pub/dns-query
    - https://doh.360.cn/dns-query

proxy-groups:
  - name: Proxy
    type: select
    include-all: true
    proxies: [Urltest]
    icon: https://ghfast.top/raw.githubusercontent.com/Orz-3/mini/master/Color/SSID.png

  - name: Urltest
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 60
    include-all: true
    icon: https://ghfast.top/raw.githubusercontent.com/Orz-3/mini/master/Color/Urltest.png

  - name: Final
    type: select
    proxies: [Proxy, DIRECT]
    icon: https://ghfast.top/raw.githubusercontent.com/Orz-3/mini/master/Color/Available.png
  
  - name: GLOBAL
    type: select
    include-all: true
    proxies: [Proxy, Urltest]
    icon: https://ghfast.top/raw.githubusercontent.com/Orz-3/mini/master/Color/Skicat.png

rules:
  - OR,((AND,((NETWORK,UDP),(DST-PORT,443))),(AND,((NETWORK,TCP),(DST-PORT,853))),(DST-PORT,3478/5349)),REJECT
  - RULE-SET,pvip,DIRECT,no-resolve
  - RULE-SET,adblock,REJECT
  - RULE-SET,me,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,micro,DIRECT
  - RULE-SET,proxy,Proxy
  - RULE-SET,cn,DIRECT
  - RULE-SET,tgip,Proxy
  - RULE-SET,cnip,DIRECT
  - MATCH,Final

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  txt: &txt {type: http, interval: 86400, behavior: domain, format: text}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

rule-providers:
  me:
    <<: *domain
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/me.mrs"
  filter:
    <<: *txt
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/filter.list"
  cn:
    <<: *domain
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/cn.mrs"
  apple:
    <<: *domain
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/apple.mrs"
  micro:
    <<: *domain
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/micro.mrs"
  proxy:
    <<: *domain
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/proxy.mrs"
  tgip:
    <<: *ip
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/tgip.mrs"
  pvip:
    <<: *ip
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/pvip.mrs"
  cnip:    
    <<: *ip
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/cnip.mrs"
  adblock:
    <<: *domain
    url: "https://ghfast.top/raw.githubusercontent.com/77160860/rule/main/mihomo/adblock.mrs"
