mode: rule
ipv6: false
allow-lan: true
mixed-port: 7890
log-level: error
bind-address: "*"
unified-delay: true
tcp-concurrent: true
find-process-mode: off
keep-alive-idle: 600
keep-alive-interval: 15

external-ui: ui
external-ui-name: zashboard
external-controller: 0.0.0.0:9090
external-ui-url: "https://ghfast.top/github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip"

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  respect-rules: true
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:  
    - "rule-set:filter" 
  default-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - quic://dns.alidns.com
    - https://doh.pub/dns-query
  nameserver:
    - quic://dns.alidns.com
    - https://doh.pub/dns-query

proxy-groups:
  - name: Proxy
    type: select
    include-all: true
    proxies: [Urltest]
    icon: https://fastly.jsdelivr.net/gh/Orz-3/mini@master/Color/SSID.png

  - name: Urltest
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 60
    include-all: true
    icon: https://fastly.jsdelivr.net/gh/Orz-3/mini@master/Color/Urltest.png

  - name: Final
    type: select
    proxies: [Proxy, DIRECT]
    icon: https://fastly.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png
  
  - name: GLOBAL
    type: select
    include-all: true
    proxies: [Proxy, Urltest]
    icon: https://fastly.jsdelivr.net/gh/Orz-3/mini@master/Color/Skicat.png

rules:
  - RULE-SET,adblock,REJECT
  - RULE-SET,me,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,microsoft,DIRECT
  - RULE-SET,proxy,Proxy
  - RULE-SET,cn,DIRECT
  - RULE-SET,tgip,Proxy
  - RULE-SET,cnip,DIRECT
  - MATCH,Final

rule-anchor:
  classical: &txt {type: http, interval: 86400, behavior: classical, format: text}
  domain_txt: &text {type: http, interval: 86400, behavior: domain, format: text}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}

rule-providers:
  me:
    <<: *txt
    url: "https://fastly.jsdelivr.net/gh/77160860/proxy@main/me.list"
  filter:
    <<: *text
    url: "https://fastly.jsdelivr.net/gh/77160860/proxy@main/filter.list"
  cn:
    <<: *domain
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/cn.mrs"
  apple:
    <<: *domain
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/apple.mrs"
  microsoft:
    <<: *domain
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/microsoft@cn.mrs"
  proxy:
    <<: *domain
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/geolocation-!cn.mrs"
  tgip:
    <<: *ip
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/telegram.mrs"
  cnip:
    <<: *ip
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/cn.mrs"
  adblock:
    <<: *domain
    url: "https://fastly.jsdelivr.net/gh/TG-Twilight/AWAvenue-Ads-Rule@main/Filters/AWAvenue-Ads-Rule-Clash.mrs"
