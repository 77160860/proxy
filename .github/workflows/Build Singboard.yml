name: Build Singboard

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Generate Metadata
        id: meta
        shell: bash
        run: |
          DATE_VER="v$(date +'%y.%-m.%-d')"
          echo "date_ver=$DATE_VER" >> $GITHUB_OUTPUT
          echo "tag=Singboard" >> $GITHUB_OUTPUT

      - name: Clone upstream source
        shell: bash
        run: |
          git clone --depth 1 --branch master https://github.com/Yuu518/singboard.git upstream

      - name: Read upstream commit
        id: commit
        shell: bash
        run: |
          cd upstream
          COMMIT_SHORT=$(git rev-parse --short=7 HEAD)
          echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: upstream/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: upstream/src-tauri -> target

      - name: Install frontend deps
        working-directory: upstream
        run: pnpm install

      - name: Build frontend
        working-directory: upstream
        run: pnpm build

      - name: Build tauri app
        working-directory: upstream
        run: pnpm tauri build

      - name: Collect exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          if (Test-Path "upstream/src-tauri/target/release/bundle") {
            Get-ChildItem -Path "upstream/src-tauri/target/release/bundle" -Recurse -File -Filter *.exe | ForEach-Object {
              Copy-Item $_.FullName -Destination "release-assets" -Force
            }
          }
          if (Test-Path "upstream/src-tauri/target/release") {
            Get-ChildItem -Path "upstream/src-tauri/target/release" -File -Filter *.exe | ForEach-Object {
              Copy-Item $_.FullName -Destination "release-assets" -Force
            }
          }
          $files = Get-ChildItem release-assets -File -Filter *.exe -ErrorAction SilentlyContinue
          if (-not $files) {
            Write-Error "No .exe files found."
            exit 1
          }
          Get-ChildItem release-assets -File -Filter *.exe | Select-Object Name,Length

      - name: Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Singboard ${{ steps.meta.outputs.date_ver }}
          body: |
            Source: Yuu518/singboard
            Commit: ${{ steps.commit.outputs.commit_short }}
          draft: false
          prerelease: false
          files: release-assets/*.exe
          make_latest: true
